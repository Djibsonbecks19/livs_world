<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Bouquet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Playfair Display',serif;}

body::before{
  content:"";position:fixed;inset:0;
  background:url('assets/lilly.jpg') no-repeat center center;
  background-size:cover;
  filter:blur(6px) brightness(0.45);
  transform:scale(1.08);
  z-index:-1;
}

.nav-back{
  position:fixed;top:clamp(14px,2vh,24px);left:clamp(14px,2vw,28px);
  z-index:300;background:rgba(255,255,255,0.14);backdrop-filter:blur(12px);
  border:1.5px solid rgba(255,255,255,0.25);color:#f5dce8;
  font-size:1.4rem;width:46px;height:46px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.25);transition:background .25s,transform .2s;text-decoration:none;
}
.nav-back:hover{background:rgba(255,255,255,0.28);transform:scale(1.08);}

/* landing */
#landingStage{
  width:100vw;height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:clamp(14px,2.5vh,28px);
}
#title-text{font-size:clamp(1.4rem,2.8vw,2.4rem);font-weight:500;color:#f5dce8;letter-spacing:0.06em;text-align:center;text-shadow:0 2px 18px rgba(0,0,0,0.5);}
#sub-text{font-style:italic;font-size:clamp(0.9rem,1.4vw,1.1rem);color:rgba(245,220,232,0.72);letter-spacing:0.08em;text-align:center;}
#bloom-btn{
  padding:clamp(13px,1.8vh,20px) clamp(36px,4vw,60px);
  font-size:clamp(0.95rem,1.5vw,1.2rem);font-weight:500;color:#fff;
  font-family:'Playfair Display',serif;
  background:linear-gradient(135deg,#d4849a,#b86070);
  border:none;border-radius:80px;cursor:pointer;letter-spacing:0.07em;
  box-shadow:0 10px 36px rgba(180,80,100,0.4);transition:transform .2s,box-shadow .2s;
}
#bloom-btn:hover{transform:scale(1.07);}
#bloom-btn:active{transform:scale(0.96);}

/* garden */
#garden{display:none;width:100vw;height:100vh;align-items:center;justify-content:center;
  gap:clamp(16px,2.5vw,40px);padding:clamp(70px,9vh,110px) clamp(16px,3vw,50px) clamp(16px,3vh,36px);}
#garden.on{display:flex;}
#canvas-wrap{position:relative;flex:1;height:100%;max-height:78vh;}
canvas{display:block;width:100%;height:100%;}

#glabel{
  position:fixed;top:clamp(14px,2.5vh,28px);left:50%;transform:translateX(-50%);
  font-style:italic;font-size:clamp(1rem,1.8vw,1.5rem);font-weight:500;
  color:#f5dce8;letter-spacing:0.08em;opacity:0;transition:opacity 1s ease 0.5s;
  white-space:nowrap;pointer-events:none;text-shadow:0 2px 16px rgba(0,0,0,0.5);
}

/* right col */
.right-col{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:clamp(12px,1.8vh,20px);flex-shrink:0;
}

/* ══ DISCORD CARD ══ */
.discord-card{
  width:clamp(240px,23vw,300px);
  border-radius:16px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  opacity:0;transform:translateY(20px);
  transition:opacity .8s ease 1s,transform .8s ease 1s;
  font-family:'Segoe UI',system-ui,sans-serif;
  position:relative;
}
.discord-card.show{opacity:1;transform:translateY(0);}

/* banner */
.dc-banner{
  width:100%;height:clamp(58px,8vh,82px);
  background:linear-gradient(135deg,#c4b0e0,#a98fd4,#d4b8e8);
  position:relative;overflow:hidden;
}
/* animated shimmer on banner */
.dc-banner::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.15) 50%,transparent 60%);
  animation:shimmer 3s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

/* avatar section */
.dc-avatar-section{
  background:#1e1b2e;
  padding:0 14px 12px;position:relative;
}
.dc-top-row{
  display:flex;justify-content:flex-end;align-items:flex-start;
  padding-top:8px;min-height:clamp(30px,4.5vh,40px);gap:4px;
}

/* guild tag */
.dc-guild-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:#2b2740;border-radius:6px;padding:3px 7px;
  font-size:clamp(0.6rem,0.75vw,0.7rem);color:#c9b8e8;
  border:1px solid rgba(180,150,220,0.25);margin-right:auto;margin-top:2px;
}
.dc-guild-dot{width:7px;height:7px;border-radius:50%;background:#b8a0d4;flex-shrink:0;}

/* avatar ring */
.dc-avatar-wrap{position:absolute;top:clamp(-38px,-5.5vh,-28px);left:14px;}
.dc-avatar-ring{
  width:clamp(66px,7.5vw,86px);height:clamp(66px,7.5vw,86px);
  border-radius:50%;border:4px solid #1e1b2e;overflow:hidden;
  background:#2a2040;position:relative;
}
.dc-avatar-ring img{width:100%;height:100%;object-fit:cover;display:block;}

/* avatar decoration overlay */
.dc-deco{
  position:absolute;inset:-12px;
  pointer-events:none;z-index:10;
  /* decoration rendered as a shimmer ring */
  border-radius:50%;
  background:conic-gradient(from 0deg,#b57bee,#7b6cf6,#e8a0b8,#b57bee);
  animation:spinDeco 4s linear infinite;
  opacity:0.6;
  mask:radial-gradient(circle,transparent 55%,black 60%);
  -webkit-mask:radial-gradient(circle,transparent 55%,black 60%);
}
@keyframes spinDeco{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* status dot */
.dc-status-dot{
  position:absolute;bottom:3px;right:3px;
  width:clamp(13px,1.5vw,16px);height:clamp(13px,1.5vw,16px);
  border-radius:50%;border:3px solid #1e1b2e;
  background:#80848e;transition:background .5s;z-index:20;
}
.dc-status-dot.online {background:#23a55a;}
.dc-status-dot.idle   {background:#f0b232;}
.dc-status-dot.dnd    {background:#f23f43;}
.dc-status-dot.offline{background:#80848e;}

/* body */
.dc-body{background:#1e1b2e;padding:clamp(32px,5vh,48px) 14px clamp(12px,1.8vh,16px);}

.dc-displayname{
  font-size:clamp(0.95rem,1.3vw,1.1rem);font-weight:700;
  color:#fff;line-height:1.2;
  /* nameplate effect */
  background:linear-gradient(90deg,#c9b8f0,#f0d0e8,#c9b8f0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:nameplateShift 4s ease infinite;
  background-size:200%;
}
@keyframes nameplateShift{0%,100%{background-position:0%}50%{background-position:100%}}

.dc-username{font-size:clamp(0.68rem,0.85vw,0.78rem);color:#b5bac1;margin-bottom:2px;}

/* status pill */
.dc-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:#2b2740;border-radius:6px;padding:4px 9px;
  margin:clamp(6px,1vh,10px) 0;
  font-size:clamp(0.65rem,0.82vw,0.76rem);
}
.dc-pill-dot{width:8px;height:8px;border-radius:50%;background:#80848e;flex-shrink:0;transition:background .5s;}
.dc-pill-dot.online {background:#23a55a;}
.dc-pill-dot.idle   {background:#f0b232;}
.dc-pill-dot.dnd    {background:#f23f43;}
.dc-pill-dot.offline{background:#80848e;}
.dc-pill-text{color:#dbdee1;font-weight:500;}

.dc-divider{height:1px;background:rgba(255,255,255,0.07);margin:clamp(8px,1.2vh,12px) 0;}

/* custom status */
.dc-custom-status{
  font-size:clamp(0.68rem,0.85vw,0.78rem);color:#dbdee1;
  display:flex;align-items:center;gap:6px;margin-bottom:4px;
}
.dc-custom-status .cs-emoji{font-size:clamp(0.8rem,1vw,0.9rem);}

/* bio */
.dc-bio{
  font-size:clamp(0.68rem,0.85vw,0.78rem);color:#dbdee1;
  line-height:1.55;
}
.dc-bio .highlight{color:#c9b8f0;font-weight:600;}

/* about me sections */
.dc-section-title{
  font-size:clamp(0.58rem,0.72vw,0.66rem);
  text-transform:uppercase;letter-spacing:1.5px;
  color:#b5bac1;margin:clamp(8px,1.2vh,12px) 0 4px;font-weight:700;
}

/* member since */
.dc-member-date{font-size:clamp(0.68rem,0.85vw,0.78rem);color:#dbdee1;}

/* games row */
.dc-games{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.dc-game{
  width:clamp(28px,3.2vw,36px);height:clamp(28px,3.2vw,36px);
  border-radius:6px;overflow:hidden;background:#2b2740;
  font-size:clamp(14px,1.6vw,18px);display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

/* spotify card */
.dc-spotify{
  background:#2b2740;border-radius:8px;padding:8px 10px;
  display:none;align-items:center;gap:8px;margin-top:4px;
  border:1px solid rgba(30,215,96,0.2);
}
.dc-spotify.show{display:flex;}
.dc-spotify-art{
  width:clamp(32px,3.5vw,40px);height:clamp(32px,3.5vw,40px);
  border-radius:4px;object-fit:cover;flex-shrink:0;background:#3a3550;
}
.dc-spotify-info{flex:1;min-width:0;}
.dc-spotify-song{font-size:clamp(0.63rem,0.8vw,0.73rem);color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dc-spotify-artist{font-size:clamp(0.58rem,0.72vw,0.66rem);color:#1ed760;}
.dc-spotify-icon{font-size:clamp(12px,1.4vw,16px);flex-shrink:0;}

/* again */
#again{
  padding:clamp(9px,1.2vh,13px) clamp(22px,2.5vw,32px);
  font-size:clamp(0.8rem,1vw,0.95rem);font-family:'Playfair Display',serif;
  color:#f5dce8;background:rgba(255,255,255,0.12);
  border:1.5px solid rgba(212,132,154,0.45);border-radius:50px;
  cursor:pointer;opacity:0;transition:opacity .5s,background .2s;backdrop-filter:blur(10px);
}
#again:hover{background:rgba(255,255,255,0.22);}

/* petals */
.petal{position:fixed;border-radius:50%;pointer-events:none;animation:fall linear infinite;opacity:0.3;}
@keyframes fall{0%{transform:translateY(-30px) rotate(0deg);opacity:0}10%{opacity:0.35}90%{opacity:0.2}100%{transform:translateY(110vh) rotate(400deg);opacity:0}}
</style>
</head>

<script>
// floating petals
(function(){
  for(let i=0;i<16;i++){
    const d=document.createElement('div');d.className='petal';
    const size=Math.random()*10+5,hue=330+Math.random()*25;
    d.style.cssText=`width:${size}px;height:${size*2}px;background:hsl(${hue},55%,80%);left:${Math.random()*100}%;top:-30px;animation-duration:${Math.random()*9+8}s;animation-delay:${Math.random()*8}s`;
    document.body.appendChild(d);
  }
})();

// canvas
let W,H,CX,BASE;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
function resizeCanvas(){
  const wrap=document.getElementById('canvas-wrap');
  W=wrap.clientWidth;H=wrap.clientHeight;cv.width=W;cv.height=H;CX=W/2;BASE=H-60;
}

const STEMS_DEF=[
  {aF:-0.38,lF:0.44,bloom:{n:6,col:'#e8a0b8',cen:'#f5d0b0',rF:0.060},lAt:0.55,lS:1, delay:0},
  {aF:-0.15,lF:0.49,bloom:{n:6,col:'#d47a92',cen:'#f0c8a8',rF:0.067},lAt:0.5, lS:-1,delay:180},
  {aF: 0.05,lF:0.52,bloom:{n:7,col:'#c96080',cen:'#f2cdb5',rF:0.074},lAt:0.48,lS:1, delay:60},
  {aF: 0.22,lF:0.46,bloom:{n:6,col:'#dfa0ba',cen:'#f8d8b8',rF:0.062},lAt:0.52,lS:-1,delay:280},
  {aF:-0.55,lF:0.39,bloom:{n:5,col:'#e8b4c4',cen:'#fce8d0',rF:0.050},lAt:0.6, lS:-1,delay:350},
  {aF: 0.42,lF:0.41,bloom:{n:5,col:'#d490a8',cen:'#f0d0c0',rF:0.053},lAt:0.58,lS:1, delay:420},
  {aF:-0.28,lF:0.54,bloom:{n:6,col:'#c07888',cen:'#f5c8b8',rF:0.064},lAt:0.45,lS:1, delay:130},
  {aF: 0.32,lF:0.50,bloom:{n:6,col:'#e098b0',cen:'#f8d0b0',rF:0.060},lAt:0.5, lS:-1,delay:240},
  {aF:-0.68,lF:0.35,bloom:{n:5,col:'#f0b8c8',cen:'#fde8d8',rF:0.047},lAt:0.62,lS:1, delay:480},
  {aF: 0.60,lF:0.37,bloom:{n:5,col:'#cc7890',cen:'#f2ccc0',rF:0.049},lAt:0.60,lS:-1,delay:510},
];
function getStems(){return STEMS_DEF.map(s=>({angle:s.aF,len:H*s.lF,bloom:{...s.bloom,r:H*s.bloom.rF},leafAt:s.lAt,leafSide:s.lS,delay:s.delay}));}
let startT=null,raf=null,STEMS=[];
function easeOut(t){return 1-Math.pow(1-t,3)}
function easeOutBack(t){const c1=1.4,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2)}
function stemTip(s,p){const ep=easeOut(Math.min(1,p));return{x:CX+Math.sin(s.angle)*s.len*ep,y:BASE-s.len*ep*Math.cos(s.angle)};}
function drawStem(s,p){
  const ep=easeOut(Math.min(1,p)),len=s.len*ep;
  const tx=CX+Math.sin(s.angle)*len,ty=BASE-len*Math.cos(s.angle);
  ctx.save();ctx.strokeStyle='#88a870';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(CX,BASE);
  ctx.bezierCurveTo(CX+Math.sin(s.angle)*len*0.25,BASE-len*0.35,CX+Math.sin(s.angle)*len*0.7,BASE-len*0.72,tx,ty);
  ctx.stroke();ctx.restore();
}
function drawLeaf(s,sp,lp){
  if(lp<=0)return;
  const ep=easeOut(Math.min(1,sp)),len=s.len*ep,t=s.leafAt;
  const c1x=CX+Math.sin(s.angle)*len*0.25,c1y=BASE-len*0.35;
  const c2x=CX+Math.sin(s.angle)*len*0.7,c2y=BASE-len*0.72;
  const tx=CX+Math.sin(s.angle)*len,ty=BASE-len*Math.cos(s.angle);
  const bx=Math.pow(1-t,3)*CX+3*Math.pow(1-t,2)*t*c1x+3*(1-t)*t*t*c2x+Math.pow(t,3)*tx;
  const by=Math.pow(1-t,3)*BASE+3*Math.pow(1-t,2)*t*c1y+3*(1-t)*t*t*c2y+Math.pow(t,3)*ty;
  const elp=easeOut(Math.min(1,lp)),llen=70*elp,perp=s.angle+Math.PI/2*s.leafSide;
  ctx.save();ctx.globalAlpha=elp;ctx.fillStyle='#7ab870';
  ctx.beginPath();ctx.moveTo(bx,by);
  ctx.quadraticCurveTo(bx+Math.cos(perp)*llen,by+Math.sin(perp)*llen,bx+Math.cos(perp)*llen*0.3,by+Math.sin(perp)*llen*0.3+16*s.leafSide);
  ctx.fill();ctx.restore();
}
function drawBloom(s,bp){
  if(bp<=0)return;
  const tip=stemTip(s,1),p=easeOutBack(Math.min(1,bp));
  const n=s.bloom.n,r=s.bloom.r*p,spin=(1-bp)*Math.PI*1.2;
  ctx.save();ctx.translate(tip.x,tip.y);
  for(let i=0;i<n;i++){
    const ang=(i/n)*Math.PI*2-Math.PI/2+spin;
    ctx.save();ctx.rotate(ang);
    ctx.fillStyle=s.bloom.col;ctx.globalAlpha=0.82*Math.min(1,bp*1.5);
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.bezierCurveTo(-r*0.42,-r*0.35,-r*0.38,-r*0.92,0,-r*1.15);
    ctx.bezierCurveTo(r*0.38,-r*0.92,r*0.42,-r*0.35,0,0);ctx.fill();
    ctx.strokeStyle=shade(s.bloom.col,-18);ctx.lineWidth=1;ctx.globalAlpha=0.3*Math.min(1,bp*1.5);ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha=Math.min(1,bp*1.8);
  const g=ctx.createRadialGradient(0,0,0,0,0,r*0.5);
  g.addColorStop(0,s.bloom.cen);g.addColorStop(1,s.bloom.col);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r*0.42,0,Math.PI*2);ctx.fill();
  for(let i=0;i<n;i++){
    const sa=(i/n)*Math.PI*2+spin;
    ctx.strokeStyle='#b05060';ctx.lineWidth=1.2;ctx.globalAlpha=0.45*Math.min(1,bp*2);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(sa)*r*0.7,Math.sin(sa)*r*0.7);ctx.stroke();
    ctx.fillStyle='#c06080';ctx.globalAlpha=0.7*Math.min(1,bp*2);
    ctx.beginPath();ctx.arc(Math.cos(sa)*r*0.72,Math.sin(sa)*r*0.72,3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function shade(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,Math.min(255,r+amt))},${Math.max(0,Math.min(255,g+amt))},${Math.max(0,Math.min(255,b+amt))})`;
}
function drawRibbon(){
  ctx.save();ctx.strokeStyle='#e8b0b8';ctx.lineWidth=6;ctx.lineCap='round';ctx.globalAlpha=0.55;
  ctx.beginPath();ctx.moveTo(CX-26,BASE+6);ctx.bezierCurveTo(CX-50,BASE-22,CX+50,BASE-22,CX+26,BASE+6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CX-20,BASE+10);ctx.bezierCurveTo(CX-14,BASE+40,CX+14,BASE+40,CX+20,BASE+10);ctx.stroke();
  ctx.restore();
}
function frame(ts){
  if(!startT)startT=ts;
  const el=ts-startT;
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'rgba(253,240,243,0.08)');bg.addColorStop(1,'rgba(247,232,221,0.08)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  drawRibbon();
  let allDone=true;
  STEMS.forEach(s=>{
    const loc=el-s.delay;if(loc<0){allDone=false;return;}
    const sp=Math.min(1,loc/900),lp=Math.min(1,Math.max(0,(loc-550)/400)),bp=Math.min(1,Math.max(0,(loc-820)/750));
    drawStem(s,sp);drawLeaf(s,sp,lp);if(sp>=1)drawBloom(s,bp);
    if(sp<1||lp<1||bp<1)allDone=false;
  });
  if(!allDone)raf=requestAnimationFrame(frame);
  else document.getElementById('again').style.opacity='1';
}

function go(){
  document.getElementById('landingStage').style.display='none';
  const g=document.getElementById('garden');g.classList.add('on');
  setTimeout(()=>document.getElementById('glabel').style.opacity='1',100);
  resizeCanvas();STEMS=getStems();startT=null;
  raf=requestAnimationFrame(frame);
  setTimeout(()=>document.getElementById('discordCard').classList.add('show'),800);
  fetchLanyard();
}
function rebloom(){
  cancelAnimationFrame(raf);document.getElementById('again').style.opacity='0';
  resizeCanvas();STEMS=getStems();startT=null;raf=requestAnimationFrame(frame);
}

// ══ LANYARD API ══
const USER_ID='1447285371091288206';

const STATUS_LABELS={
  online:'Online 🌸', idle:'Idle 🌙', dnd:'Do Not Disturb', offline:'Offline'
};

function applyStatus(status){
  const dot=document.getElementById('dcDot');
  const pdot=document.getElementById('dcPillDot');
  const ptxt=document.getElementById('dcPillText');
  ['online','idle','dnd','offline'].forEach(c=>{dot.classList.remove(c);pdot.classList.remove(c);});
  dot.classList.add(status);pdot.classList.add(status);
  ptxt.textContent=STATUS_LABELS[status]||'Offline';
}

function fetchLanyard(){
  fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`)
    .then(r=>r.json())
    .then(d=>{
      if(!d.success)return;
      const data=d.data;

      // avatar
      const avatarUrl=`https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png?size=128`;
      document.getElementById('dcAvatarImg').src=avatarUrl;

      // display name
      if(data.discord_user.global_name){
        document.getElementById('dcDisplayName').textContent=data.discord_user.global_name;
      }

      // status
      applyStatus(data.discord_status||'offline');

      // custom status from activities
      const customAct=data.activities&&data.activities.find(a=>a.type===4);
      const csEl=document.getElementById('dcCustomStatus');
      if(customAct&&customAct.state){
        document.getElementById('dcCustomEmoji').textContent=customAct.emoji?customAct.emoji.name||'💭':'💭';
        document.getElementById('dcCustomText').textContent=customAct.state;
        csEl.style.display='flex';
      } else {
        csEl.style.display='none';
      }

      // spotify
      const sp=document.getElementById('dcSpotify');
      if(data.listening_to_spotify&&data.spotify){
        document.getElementById('dcSpotifySong').textContent=data.spotify.song;
        document.getElementById('dcSpotifyArtist').textContent=data.spotify.artist;
        if(data.spotify.album_art_url){
          document.getElementById('dcSpotifyArt').src=data.spotify.album_art_url;
        }
        sp.classList.add('show');
      } else {
        sp.classList.remove('show');
      }
    })
    .catch(()=>{});

  // refresh every 30 seconds
  setTimeout(fetchLanyard,30000);
}
</script>
