<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Bouquet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}

/* ── back arrow ── */
.nav-back {
    position: fixed;
    top: 22px;
    left: 24px;
    z-index: 200;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    border: 1.5px solid rgba(212,160,160,0.35);
    color: #8b5a6a;
    font-size: 1.3rem;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(180,100,110,0.15);
    transition: background 0.25s, transform 0.2s;
    text-decoration: none;
}
.nav-back:hover { background: rgba(255,255,255,0.85); transform: scale(1.08); }

#wrap{
    width:100vw;height:100vh;
    background:linear-gradient(160deg,#fdf0f3 0%,#f7e8dd 100%);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    position:relative;overflow:hidden;
}
#title-text{
    font-family:'Playfair Display',serif;
    font-size:36px;font-weight:500;
    color:#7d4a5a;letter-spacing:0.06em;
    margin-bottom:8px;text-align:center;
}
#sub-text{
    font-family:'Playfair Display',serif;font-style:italic;
    font-size:17px;color:#b08090;
    margin-bottom:36px;letter-spacing:0.08em;text-align:center;
}
#bloom-btn{
    padding:16px 56px;font-size:17px;font-weight:500;
    color:#fff;font-family:'Playfair Display',serif;
    background:linear-gradient(135deg,#d4849a,#b86070);
    border:none;border-radius:80px;cursor:pointer;
    letter-spacing:0.07em;
    box-shadow:0 10px 36px rgba(180,80,100,0.3);
    transition:transform 0.2s,box-shadow 0.2s;
}
#bloom-btn:hover{transform:scale(1.07);box-shadow:0 14px 44px rgba(180,80,100,0.4)}
#bloom-btn:active{transform:scale(0.96)}

#garden{
    display:none;width:100vw;height:100vh;
    background:linear-gradient(160deg,#fdf0f3 0%,#f7e8dd 100%);
    position:relative;overflow:hidden;
    align-items:center;justify-content:center;flex-direction:column;
}
#garden.on{display:flex}
canvas{display:block;position:absolute;inset:0;width:100%;height:100%}

#glabel{
    position:absolute;top:40px;left:50%;transform:translateX(-50%);
    font-family:'Playfair Display',serif;font-style:italic;
    font-size:30px;font-weight:500;color:#7d4a5a;
    letter-spacing:0.08em;opacity:0;
    transition:opacity 1s ease 0.5s;white-space:nowrap;pointer-events:none;
}
#again{
    position:absolute;bottom:28px;right:36px;
    padding:10px 26px;font-size:14px;
    font-family:'Playfair Display',serif;
    color:#b06070;background:rgba(255,255,255,0.65);
    border:1.5px solid #d4a0b0;border-radius:50px;
    cursor:pointer;opacity:0;
    transition:opacity 0.5s,background 0.2s;
}
#again:hover{background:rgba(255,255,255,0.95)}

/* floating petals on landing */
.petal{
    position:absolute;border-radius:50%;
    pointer-events:none;animation:fall linear infinite;
    opacity:0.45;
}
@keyframes fall{
    0%{transform:translateY(-30px) rotate(0deg);opacity:0}
    10%{opacity:0.5}
    90%{opacity:0.3}
    100%{transform:translateY(110vh) rotate(400deg);opacity:0}
}
</style>
</head>
<body>

<a class="nav-back" href="reveal.html" title="Go back">‹</a>

<div id="wrap">
    <div id="title-text">A Bouquet, Just For You</div>
    <div id="sub-text">soft blooms, tied with love</div>
    <button id="bloom-btn" onclick="go()">✦ Bloom</button>
</div>

<div id="garden">
    <div id="glabel">Your Lily Bouquet</div>
    <canvas id="c"></canvas>
    <button id="again" onclick="rebloom()">↺ Again</button>
</div>

<script>
let W,H,CX,BASE;
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');

function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W; cv.height=H;
    CX=W/2; BASE=H-80;
}
resize();
window.addEventListener('resize',()=>{resize();});

// spawn floating petals on landing
(function spawnLandingPetals(){
    const wrap=document.getElementById('wrap');
    for(let i=0;i<18;i++){
        const d=document.createElement('div');
        d.className='petal';
        const size=Math.random()*10+5;
        const hue=330+Math.random()*25;
        const left=Math.random()*100;
        const delay=Math.random()*8;
        const dur=Math.random()*9+8;
        d.style.cssText=`width:${size}px;height:${size*2}px;background:hsl(${hue},58%,82%);left:${left}%;top:-30px;animation-duration:${dur}s;animation-delay:${delay}s`;
        wrap.appendChild(d);
    }
})();

const STEMS_DEF=[
    {angleFrac:-0.38,lenFrac:0.44,bloom:{petals:6,color:'#e8a0b8',center:'#f5d0b0',rFrac:0.060},leafAt:0.55,leafSide:1, delay:0},
    {angleFrac:-0.15,lenFrac:0.49,bloom:{petals:6,color:'#d47a92',center:'#f0c8a8',rFrac:0.067},leafAt:0.5, leafSide:-1,delay:180},
    {angleFrac: 0.05,lenFrac:0.52,bloom:{petals:7,color:'#c96080',center:'#f2cdb5',rFrac:0.074},leafAt:0.48,leafSide:1, delay:60},
    {angleFrac: 0.22,lenFrac:0.46,bloom:{petals:6,color:'#dfa0ba',center:'#f8d8b8',rFrac:0.062},leafAt:0.52,leafSide:-1,delay:280},
    {angleFrac:-0.55,lenFrac:0.39,bloom:{petals:5,color:'#e8b4c4',center:'#fce8d0',rFrac:0.050},leafAt:0.6, leafSide:-1,delay:350},
    {angleFrac: 0.42,lenFrac:0.41,bloom:{petals:5,color:'#d490a8',center:'#f0d0c0',rFrac:0.053},leafAt:0.58,leafSide:1, delay:420},
    {angleFrac:-0.28,lenFrac:0.54,bloom:{petals:6,color:'#c07888',center:'#f5c8b8',rFrac:0.064},leafAt:0.45,leafSide:1, delay:130},
    {angleFrac: 0.32,lenFrac:0.50,bloom:{petals:6,color:'#e098b0',center:'#f8d0b0',rFrac:0.060},leafAt:0.5, leafSide:-1,delay:240},
    {angleFrac:-0.68,lenFrac:0.35,bloom:{petals:5,color:'#f0b8c8',center:'#fde8d8',rFrac:0.047},leafAt:0.62,leafSide:1, delay:480},
    {angleFrac: 0.60,lenFrac:0.37,bloom:{petals:5,color:'#cc7890',center:'#f2ccc0',rFrac:0.049},leafAt:0.60,leafSide:-1,delay:510},
];

function getStems(){
    return STEMS_DEF.map(s=>({
        angle:s.angleFrac,
        len:H*s.lenFrac,
        bloom:{...s.bloom,r:H*s.bloom.rFrac},
        leafAt:s.leafAt,leafSide:s.leafSide,delay:s.delay,
    }));
}

let startT=null,raf=null,STEMS=[];

function easeOut(t){return 1-Math.pow(1-t,3)}
function easeOutBack(t){const c1=1.4,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2)}

function stemTip(s,prog){
    const p=easeOut(Math.min(1,prog));
    const len=s.len*p;
    return{x:CX+Math.sin(s.angle)*len, y:BASE-len*Math.cos(s.angle)};
}

function drawStem(s,prog){
    const p=easeOut(Math.min(1,prog));
    const len=s.len*p;
    const tx=CX+Math.sin(s.angle)*len, ty=BASE-len*Math.cos(s.angle);
    const c1x=CX+Math.sin(s.angle)*len*0.25, c1y=BASE-len*0.35;
    const c2x=CX+Math.sin(s.angle)*len*0.7,  c2y=BASE-len*0.72;
    ctx.save();
    ctx.strokeStyle='#88a870';ctx.lineWidth=5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(CX,BASE);
    ctx.bezierCurveTo(c1x,c1y,c2x,c2y,tx,ty);ctx.stroke();
    ctx.restore();
}

function drawLeaf(s,stemProg,leafProg){
    if(leafProg<=0)return;
    const p=easeOut(Math.min(1,stemProg));
    const len=s.len*p;
    const t=s.leafAt;
    const c1x=CX+Math.sin(s.angle)*len*0.25,c1y=BASE-len*0.35;
    const c2x=CX+Math.sin(s.angle)*len*0.7, c2y=BASE-len*0.72;
    const tx=CX+Math.sin(s.angle)*len, ty=BASE-len*Math.cos(s.angle);
    const bx=Math.pow(1-t,3)*CX+3*Math.pow(1-t,2)*t*c1x+3*(1-t)*t*t*c2x+Math.pow(t,3)*tx;
    const by=Math.pow(1-t,3)*BASE+3*Math.pow(1-t,2)*t*c1y+3*(1-t)*t*t*c2y+Math.pow(t,3)*ty;
    const lp=easeOut(Math.min(1,leafProg));
    const llen=70*lp;
    const perp=s.angle+Math.PI/2*s.leafSide;
    const lx=bx+Math.cos(perp)*llen, ly=by+Math.sin(perp)*llen;
    ctx.save();
    ctx.globalAlpha=lp;ctx.fillStyle='#7ab870';
    ctx.beginPath();ctx.moveTo(bx,by);
    ctx.quadraticCurveTo(lx,ly,bx+Math.cos(perp)*llen*0.3,by+Math.sin(perp)*llen*0.3+16*s.leafSide);
    ctx.fill();ctx.restore();
}

function drawBloom(s,bloomProg){
    if(bloomProg<=0)return;
    const tip=stemTip(s,1);
    const p=easeOutBack(Math.min(1,bloomProg));
    const n=s.bloom.petals;
    const r=s.bloom.r*p;
    const spin=(1-bloomProg)*Math.PI*1.2;
    ctx.save();ctx.translate(tip.x,tip.y);
    for(let i=0;i<n;i++){
        const ang=(i/n)*Math.PI*2-Math.PI/2+spin;
        ctx.save();ctx.rotate(ang);
        ctx.fillStyle=s.bloom.color;
        ctx.globalAlpha=0.82*Math.min(1,bloomProg*1.5);
        ctx.beginPath();ctx.moveTo(0,0);
        ctx.bezierCurveTo(-r*0.42,-r*0.35,-r*0.38,-r*0.92,0,-r*1.15);
        ctx.bezierCurveTo( r*0.38,-r*0.92, r*0.42,-r*0.35,0,0);
        ctx.fill();
        ctx.strokeStyle=shade(s.bloom.color,-18);ctx.lineWidth=1;
        ctx.globalAlpha=0.3*Math.min(1,bloomProg*1.5);ctx.stroke();
        ctx.restore();
    }
    ctx.globalAlpha=Math.min(1,bloomProg*1.8);
    const g=ctx.createRadialGradient(0,0,0,0,0,r*0.5);
    g.addColorStop(0,s.bloom.center);g.addColorStop(1,s.bloom.color);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r*0.42,0,Math.PI*2);ctx.fill();
    for(let st=0;st<n;st++){
        const sa=(st/n)*Math.PI*2+spin;
        ctx.strokeStyle='#b05060';ctx.lineWidth=1.2;
        ctx.globalAlpha=0.45*Math.min(1,bloomProg*2);
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(sa)*r*0.7,Math.sin(sa)*r*0.7);ctx.stroke();
        ctx.fillStyle='#c06080';ctx.globalAlpha=0.7*Math.min(1,bloomProg*2);
        ctx.beginPath();ctx.arc(Math.cos(sa)*r*0.72,Math.sin(sa)*r*0.72,3,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
}

function shade(hex,amt){
    let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,Math.min(255,r+amt))},${Math.max(0,Math.min(255,g+amt))},${Math.max(0,Math.min(255,b+amt))})`;
}

function drawRibbon(){
    ctx.save();
    ctx.strokeStyle='#e8b0b8';ctx.lineWidth=6;ctx.lineCap='round';ctx.globalAlpha=0.55;
    ctx.beginPath();ctx.moveTo(CX-26,BASE+6);
    ctx.bezierCurveTo(CX-50,BASE-22,CX+50,BASE-22,CX+26,BASE+6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(CX-20,BASE+10);
    ctx.bezierCurveTo(CX-14,BASE+40,CX+14,BASE+40,CX+20,BASE+10);ctx.stroke();
    ctx.restore();
}

function frame(ts){
    if(!startT)startT=ts;
    const el=ts-startT;
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#fdf0f3');bg.addColorStop(1,'#f7e8dd');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    drawRibbon();
    let allDone=true;
    STEMS.forEach(s=>{
        const loc=el-s.delay;
        if(loc<0){allDone=false;return;}
        const sp=Math.min(1,loc/900);
        const lp=Math.min(1,Math.max(0,(loc-550)/400));
        const bp=Math.min(1,Math.max(0,(loc-820)/750));
        drawStem(s,sp);drawLeaf(s,sp,lp);
        if(sp>=1)drawBloom(s,bp);
        if(sp<1||lp<1||bp<1)allDone=false;
    });
    if(!allDone)raf=requestAnimationFrame(frame);
    else document.getElementById('again').style.opacity='1';
}

function go(){
    document.getElementById('wrap').style.display='none';
    const g=document.getElementById('garden');
    g.classList.add('on');
    setTimeout(()=>document.getElementById('glabel').style.opacity='1',100);
    STEMS=getStems();startT=null;
    raf=requestAnimationFrame(frame);
}

function rebloom(){
    cancelAnimationFrame(raf);
    document.getElementById('again').style.opacity='0';
    STEMS=getStems();startT=null;
    raf=requestAnimationFrame(frame);
}
</script>
</body>
</html>
