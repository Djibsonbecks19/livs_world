<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Divine Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="Olivia/image.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100dvh;font-family:'Playfair Display',serif;overflow-x:hidden;overflow-y:auto;}

body::before{
  content:"";position:fixed;inset:0;
  background:url('assets/lilly.jpg') no-repeat center center / cover;
  filter:blur(6px) brightness(0.5);transform:scale(1.08);z-index:-1;
}

/* ── nav back ── */
.nav-back{
  position:fixed;top:clamp(12px,2vh,20px);left:clamp(12px,2vw,22px);z-index:300;
  background:rgba(255,240,248,0.18);backdrop-filter:blur(12px);
  border:1.5px solid rgba(255,200,220,0.4);color:#f5dce8;font-size:1.3rem;
  width:44px;height:44px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:background .25s,transform .2s;text-decoration:none;
}
.nav-back:hover{background:rgba(255,200,220,0.35);transform:scale(1.08);}

/* ── top label ── */
.subtitle{
  position:fixed;top:clamp(12px,2.5vh,24px);left:50%;transform:translateX(-50%);
  color:#f5dce8;font-size:clamp(0.9rem,1.8vw,1.4rem);font-style:italic;letter-spacing:3px;
  text-shadow:0 2px 16px rgba(0,0,0,0.6);white-space:nowrap;z-index:10;
  animation:softPulse 3s infinite ease-in-out;
}
@keyframes softPulse{
  0%,100%{opacity:.75;transform:translateX(-50%) scale(1)}
  50%{opacity:1;transform:translateX(-50%) scale(1.02)}
}

/* ── main stage ── */
.stage{
  width:100%;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(20px,3.5vw,52px);
  padding:clamp(60px,8vh,90px) clamp(16px,4vw,56px) clamp(30px,5vh,56px);
}

/* ── image card ── */
.image-container{
  flex-shrink:0;
  width:clamp(220px,24vw,380px);
  height:clamp(520px,75vh,760px);
  border-radius:clamp(14px,1.6vw,26px);
  border:clamp(3px,0.45vw,7px) solid rgba(255,255,255,0.88);
  overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
  position:relative;
  opacity:0;transform:translateY(40px);
  transition:opacity 1s ease,transform 1s ease;
}
.image-container.show{opacity:1;transform:translateY(0);}

/* ── CAROUSEL FIX: track = flex row, each slide = 100% of container width ── */
.carousel-track{
  display:flex;
  /* width set by JS: slides.length * 100% */
  height:100%;
  transition:transform 0.5s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.carousel-slide{
  /* width set by JS: 100% / slides.length */
  height:100%;
  flex-shrink:0;
  overflow:hidden;
  background:#1a0a10;
}
.carousel-slide img{
  width:100%;height:100%;
  object-fit:cover;object-position:center top;
  display:block;
}

/* ── carousel controls ── */
.carousel-btn{
  position:absolute;top:50%;transform:translateY(-50%);z-index:15;
  background:rgba(255,255,255,0.22);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.3);color:#f5dce8;
  width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .25s,transform .2s;
}
.carousel-btn:hover{background:rgba(255,200,220,0.45);transform:translateY(-50%) scale(1.1);}
.carousel-btn.prev{left:8px;}
.carousel-btn.next{right:8px;}

.carousel-dots{
  position:absolute;bottom:74px;left:50%;transform:translateX(-50%);
  display:flex;gap:7px;z-index:15;
}
.carousel-dots .dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,255,255,0.38);cursor:pointer;
  transition:all .3s;
}
.carousel-dots .dot.active{background:#f5dce8;transform:scale(1.35);}

/* slide counter badge */
.slide-counter{
  position:absolute;top:12px;right:14px;z-index:15;
  font-size:0.62rem;color:rgba(255,255,255,0.75);
  background:rgba(0,0,0,0.38);backdrop-filter:blur(6px);
  border-radius:20px;padding:3px 9px;letter-spacing:.5px;
}

/* ── bouquet button (over photo) ── */
.bouquet-btn{
  position:absolute;bottom:clamp(28px,4vh,48px);left:50%;transform:translateX(-50%);
  z-index:20;padding:clamp(7px,1vh,11px) clamp(16px,2vw,26px);
  background:linear-gradient(135deg,#d4849a,#b86070);
  color:#fff;border:none;border-radius:50px;
  font-family:'Playfair Display',serif;font-size:clamp(0.65rem,1vw,0.85rem);
  letter-spacing:1.5px;cursor:pointer;white-space:nowrap;
  box-shadow:0 6px 20px rgba(180,80,100,0.5);
  opacity:0;transition:opacity .6s ease 1.6s,transform .2s;
}
.bouquet-btn:hover{transform:translateX(-50%) scale(1.08);}
.image-container.show .bouquet-btn{opacity:1;}

/* ── music card ── */
.music-card{
  background:rgba(255,240,248,0.18);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  padding:clamp(18px,2.5vh,32px) clamp(18px,2.5vw,32px);
  border-radius:clamp(18px,2vw,36px);
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
  width:clamp(240px,28vw,400px);text-align:center;
  border:1px solid rgba(255,200,220,0.38);
  max-height:clamp(150px,17vh,155px);overflow:hidden;
  opacity:0;transform:translateY(40px);
  transition:opacity 1s ease .3s,transform 1s ease .3s,max-height .7s cubic-bezier(.4,0,.2,1),background .3s;
}
.music-card.show{opacity:1;transform:translateY(0);}
.music-card:hover{max-height:700px;background:rgba(255,240,248,0.28);}

.music-card h3{
  color:#f5dce8;margin-bottom:clamp(10px,1.6vh,18px);
  font-size:clamp(0.8rem,1.2vw,1.1rem);letter-spacing:1px;
}
.controls{display:flex;justify-content:center;gap:clamp(10px,1.4vw,20px);margin-bottom:clamp(8px,1.2vh,16px);}
.control-btn{
  background:linear-gradient(135deg,#d4849a,#b86070);border:none;
  width:clamp(36px,4vw,50px);height:clamp(36px,4vw,50px);border-radius:50%;
  color:#fff;cursor:pointer;transition:.3s;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 5px 14px rgba(180,96,112,0.4);font-size:clamp(0.75rem,1vw,1rem);
}
.control-btn:hover{transform:scale(1.12);}

.expand-content{opacity:0;transition:opacity .4s ease;pointer-events:none;}
.music-card:hover .expand-content{opacity:1;pointer-events:auto;}

.slider-box{margin:clamp(8px,1.3vh,16px) 0;}
input[type=range]{accent-color:#d4849a;cursor:pointer;height:4px;width:100%;}
label{color:#f5dce8;font-size:clamp(0.65rem,0.85vw,0.8rem);}
.time-row{display:flex;justify-content:space-between;font-size:clamp(0.7rem,0.95vw,0.9rem);color:#f5dce8;margin-bottom:4px;width:100%;align-items:center;}
.time-row input{flex:1;margin:0 8px;}
.vol-row{display:flex;flex-direction:row;align-items:center;gap:8px;}
.vol-row span{color:#f5dce8;font-size:1rem;}

.romantic-text{
  font-style:italic;color:rgba(255,240,248,0.9);line-height:1.7;
  margin-top:clamp(12px,1.8vh,20px);font-size:clamp(0.72rem,0.9vw,0.9rem);
  padding-top:clamp(10px,1.3vh,16px);border-top:1px solid rgba(255,200,220,0.3);font-weight:500;
}

/* floating heart particles */
.particle{position:fixed;top:0;left:0;pointer-events:none;z-index:50;font-size:clamp(16px,2vw,24px);will-change:transform,opacity;}

/* ── mobile ── */
@media(max-width:640px){
  .stage{
    flex-direction:column;justify-content:flex-start;align-items:center;
    gap:18px;min-height:100dvh;height:auto;padding:76px 14px 36px;
  }
 .image-container{width:min(260px,80vw);height:min(520px,85vh);}  
 .music-card{width:100%;max-width:420px;}
}
@media(min-width:641px) and (max-width:900px){
  .stage{gap:clamp(14px,2.5vw,32px);padding:56px 14px 16px;}
  .image-container{width:clamp(160px,20vw,260px);height:clamp(320px,52vh,500px);}
  .music-card{width:clamp(200px,30vw,360px);}
}
</style>
</head>
<body>

<a class="nav-back" href="index.html" id="backBtn">‹</a>
<p class="subtitle" id="mainText">A Moment of Pure Elegance 🐰</p>

<div class="stage" id="stage">

  <!-- IMAGE CAROUSEL -->
  <div class="image-container" id="imgContainer">

    <div class="carousel-track" id="carouselInner">
      <div class="carousel-slide"><img src="Olivia/Olivia.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka1.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka2.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka3.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka4.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka5.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka6.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka7.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka8.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka9.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka10.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka11.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka12.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka13.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka14.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka15.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka16.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka17.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka18.jpg" alt=""></div>
    </div>

    <button class="carousel-btn prev" id="prevBtn">‹</button>
    <button class="carousel-btn next" id="nextBtn">›</button>
    <div class="carousel-dots" id="carouselDots"></div>
    <div class="slide-counter" id="slideCounter">1 / 11</div>

    <button class="bouquet-btn" id="bouquetBtn">🌸 See Your Bouquet</button>
  </div>

  <!-- MUSIC CARD -->
  <div class="music-card" id="musicCard">
    <h3 id="songTitle">Now Playing ♪</h3>

    <div class="controls">
      <button class="control-btn" onclick="restartMusic()">↺</button>
      <button class="control-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button class="control-btn" onclick="stopMusic()">■</button>
    </div>

    <div class="expand-content">
      <div class="slider-box">
        <label>Seek</label>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <input type="range" id="progressSlider" value="0" min="0" max="100">
          <span id="durationTime">0:00</span>
        </div>
      </div>
      <div class="slider-box vol-row">
        <span>🔈</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" style="flex:1">
        <span>🔊</span>
      </div>
      <div class="romantic-text">
        In your eyes, I see strength and kindness. Every beat of this song reminds me of the grace you carry.
        You have a way of bringing light into the people around you. keep being you baby 🌸
      </div>
    </div>
  </div>

</div>

<audio id="loveSong"><source src="assets/i_was_all_over_her.mp3" type="audio/mpeg"></audio>

<script>
const song         = document.getElementById('loveSong');
const playPauseBtn = document.getElementById('playPauseBtn');
const progressSlider = document.getElementById('progressSlider');
const volumeSlider = document.getElementById('volumeSlider');
const songTitle    = document.getElementById('songTitle');
const mainText     = document.getElementById('mainText');
const imgContainer = document.getElementById('imgContainer');
const musicCard    = document.getElementById('musicCard');
const currentTime  = document.getElementById('currentTime');
const durationTime = document.getElementById('durationTime');
const bouquetBtn   = document.getElementById('bouquetBtn');
const backBtn      = document.getElementById('backBtn');
const particles    = ['🌸','🌹','💖','✨','🌷','🤍','🐰'];

// ═══════════ CAROUSEL ═══════════
const track       = document.getElementById('carouselInner');
const prevBtn     = document.getElementById('prevBtn');
const nextBtn     = document.getElementById('nextBtn');
const dotsWrap    = document.getElementById('carouselDots');
const counter     = document.getElementById('slideCounter');
const slides      = Array.from(track.querySelectorAll('.carousel-slide'));
const N           = slides.length;
let cur           = 0;
let autoTimer     = null;

// KEY FIX: make track N times wide, each slide 1/N of that
track.style.width = (N * 100) + '%';
slides.forEach(s => { s.style.width = (100 / N) + '%'; });

function updateCarousel(animate=true) {
  if (!animate) track.style.transition = 'none';
  // translateX moves by (cur / N * 100)% of the total track width
  // which equals cur * (100/N)% per slide = cur * containerWidth
  track.style.transform = `translateX(-${cur * (100 / N)}%)`;
  if (!animate) requestAnimationFrame(() => { track.style.transition = ''; });
  // dots
  dotsWrap.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===cur));
  // counter
  counter.textContent = `${cur+1} / ${N}`;
}

function goTo(index) {
  cur = (index + N) % N;
  updateCarousel();
  resetAuto();
}

function makeDots() {
  slides.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i===0?' active':'');
    d.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(d);
  });
}

function resetAuto() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => goTo(cur + 1), 5000);
}

prevBtn.addEventListener('click', () => goTo(cur - 1));
nextBtn.addEventListener('click', () => goTo(cur + 1));

// swipe support
let touchX = 0;
track.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive:true});
track.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) goTo(cur + (dx < 0 ? 1 : -1));
}, {passive:true});

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') goTo(cur+1);
  if (e.key==='ArrowLeft')  goTo(cur-1);
});

makeDots();
resetAuto();

// ═══════════ SESSION STORAGE ═══════════
function saveState() {
  sessionStorage.setItem('mp_time',    song.currentTime || 0);
  sessionStorage.setItem('mp_playing', (!song.paused).toString());
  sessionStorage.setItem('mp_volume',  song.volume);
}
bouquetBtn?.addEventListener('click', () => { saveState(); window.location.href = 'bouquet.html'; });
backBtn?.addEventListener('click', e => { e.preventDefault(); saveState(); window.location.href = 'index.html'; });
window.addEventListener('beforeunload', saveState);
window.addEventListener('pagehide', saveState);

// ═══════════ AUDIO ═══════════
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + (sec<10?'0':'') + sec;
}
function togglePlay() {
  if (song.paused) { song.play().catch(()=>{}); playPauseBtn.textContent='||'; }
  else             { song.pause(); playPauseBtn.textContent='▶'; }
}
function restartMusic() { song.currentTime=0; song.play().catch(()=>{}); playPauseBtn.textContent='||'; }
function stopMusic()    { song.pause(); song.currentTime=0; playPauseBtn.textContent='▶'; }

song.addEventListener('loadedmetadata', () => { durationTime.textContent = fmt(song.duration); });
song.addEventListener('timeupdate', () => {
  if (!song.duration) return;
  progressSlider.value = (song.currentTime / song.duration) * 100;
  currentTime.textContent = fmt(song.currentTime);
});
song.addEventListener('ended', () => { playPauseBtn.textContent='▶'; });
progressSlider.addEventListener('input', () => { song.currentTime = (progressSlider.value/100) * song.duration; });
volumeSlider.addEventListener('input', e => { song.volume = e.target.value; });

// ═══════════ PARTICLES ═══════════
function createParticle(x, y) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = particles[Math.floor(Math.random() * particles.length)];
  document.body.appendChild(p);
  p.style.left = x+'px'; p.style.top = y+'px'; p.style.transform = 'translate(-50%,-50%)';
  const dx=(Math.random()-.5)*700, dy=(Math.random()-.5)*700;
  p.animate([
    {transform:'translate(-50%,-50%) scale(0)',opacity:1},
    {transform:`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(1.5) rotate(720deg)`,opacity:0}
  ],{duration:3000,easing:'cubic-bezier(0.1,0.9,0.2,1)'}).onfinish = () => p.remove();
}

// ═══════════ LOAD ═══════════
window.addEventListener('load', () => {
  const savedTime  = parseFloat(sessionStorage.getItem('mp_time')    || '0');
  const savedVol   = parseFloat(sessionStorage.getItem('mp_volume')  || '1');
  const wasPlaying = sessionStorage.getItem('mp_playing') === 'true';

  imgContainer.classList.add('show');
  musicCard.classList.add('show');
  mainText.textContent = "My love's World 🐰";
  songTitle.textContent = "I Was All Over Her — Salvia Palth";

  song.volume = savedVol;
  volumeSlider.value = savedVol;

  song.addEventListener('canplay', function onReady() {
    song.removeEventListener('canplay', onReady);
    try {
      if (savedTime > 0) song.currentTime = savedTime;
      if (wasPlaying) { song.play().catch(()=>{}); playPauseBtn.textContent = '||'; }
    } catch(e) {}
  }, {once:true});

  // always try to autoplay on reveal
  setTimeout(() => {
    song.play().then(() => { playPauseBtn.textContent = '||'; }).catch(() => {});
  }, 400);

  // particle burst
  setTimeout(() => {
    const r = imgContainer.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    for (let i=0;i<70;i++) setTimeout(() => createParticle(cx,cy), i*7);
  }, 700);
});
</script>
</body>
</html>
