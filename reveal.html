<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Divine Reveal 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="Olivia/image.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100dvh;font-family:'Playfair Display',serif;overflow-x:hidden;overflow-y:auto;}

body::before{
  content:"";position:fixed;inset:0;
  background:url('assets/lilly.jpg') no-repeat center center/cover;
  filter:blur(7px) brightness(0.45) saturate(1.1);
  transform:scale(1.1);z-index:-1;
}
body::after{
  content:"";position:fixed;inset:0;
  background:radial-gradient(ellipse at 60% 40%,rgba(212,132,154,0.08) 0%,rgba(10,4,14,0.5) 100%);
  z-index:-1;
}

/* ── nav ── */
.nav-back{
  position:fixed;top:20px;left:20px;z-index:300;
  background:rgba(255,240,248,0.15);backdrop-filter:blur(14px);
  border:1px solid rgba(255,200,220,0.35);color:#f5dce8;font-size:1.2rem;
  width:42px;height:42px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);transition:background .2s,transform .2s;text-decoration:none;
}
.nav-back:hover{background:rgba(255,200,220,0.3);transform:scale(1.08);}

/* ── top label ── */
.subtitle{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(245,220,232,0.8);font-size:clamp(0.85rem,1.4vw,1.2rem);
  letter-spacing:0.2em;white-space:nowrap;z-index:10;
  text-shadow:0 2px 16px rgba(0,0,0,0.5);
  animation:fadeIn 1s ease both;
}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── stage ── */
.stage{
  width:100%;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(24px,4vw,64px);
  padding:clamp(64px,9vh,100px) clamp(20px,5vw,80px) clamp(30px,5vh,60px);
}

/* ── image card ── */
.image-container{
  flex-shrink:0;
  width:clamp(220px,24vw,380px);
  height:clamp(520px,75vh,760px);
  border-radius:clamp(16px,1.6vw,28px);
  border:2px solid rgba(255,255,255,0.5);
  outline:1px solid rgba(212,132,154,0.25);
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,0.55), 0 0 0 8px rgba(212,132,154,0.06);
  position:relative;
  opacity:0;transform:translateY(36px) scale(0.97);
  transition:opacity 1.1s ease,transform 1.1s ease;
}
.image-container.show{opacity:1;transform:translateY(0) scale(1);}

/* ── carousel ── */
.carousel-track{display:flex;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);will-change:transform;}
.carousel-slide{height:100%;flex-shrink:0;overflow:hidden;background:#120810;}
.carousel-slide img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}

/* carousel btns */
.carousel-btn{
  position:absolute;top:50%;transform:translateY(-50%);z-index:15;
  background:rgba(10,4,14,0.45);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.18);color:#f5dce8;
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;opacity:0;
}
.image-container:hover .carousel-btn{opacity:1;}
.carousel-btn:hover{background:rgba(212,132,154,0.4);transform:translateY(-50%) scale(1.12);}
.carousel-btn.prev{left:8px;}
.carousel-btn.next{right:8px;}

.carousel-dots{
  position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:15;
}
.carousel-dots .dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.32);cursor:pointer;transition:all .3s;
}
.carousel-dots .dot.active{background:#f5dce8;width:18px;border-radius:3px;}

.slide-counter{
  position:absolute;top:12px;right:12px;z-index:15;
  font-size:0.6rem;color:rgba(255,255,255,0.65);
  background:rgba(0,0,0,0.42);backdrop-filter:blur(6px);
  border-radius:20px;padding:3px 10px;letter-spacing:.6px;
}

/* ── bouquet btn ── */
.bouquet-btn{
  position:absolute;bottom:clamp(24px,4vh,44px);left:50%;transform:translateX(-50%);z-index:20;
  padding:clamp(8px,1.1vh,13px) clamp(18px,2.5vw,30px);
  background:linear-gradient(135deg,rgba(212,132,154,0.92),rgba(184,96,112,0.92));
  color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:50px;
  font-family:'Playfair Display',serif;font-size:clamp(0.65rem,0.95vw,0.82rem);
  letter-spacing:1.8px;cursor:pointer;white-space:nowrap;
  box-shadow:0 8px 24px rgba(180,80,100,0.5);
  backdrop-filter:blur(8px);
  opacity:0;transition:opacity .6s ease 1.6s,transform .2s;
}
.bouquet-btn:hover{transform:translateX(-50%) scale(1.07);}
.image-container.show .bouquet-btn{opacity:1;}

/* ── right side: music + info ── */
.right-side{
  display:flex;flex-direction:column;
  gap:clamp(16px,2.5vh,28px);
  width:clamp(260px,30vw,440px);
  opacity:0;transform:translateY(30px);
  transition:opacity 1s ease .4s,transform 1s ease .4s;
}
.right-side.show{opacity:1;transform:translateY(0);}

/* song title area */
.song-meta{
  text-align:center;
  padding:clamp(14px,2vh,22px) clamp(16px,2vw,24px);
  background:rgba(255,240,248,0.1);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,200,220,0.2);
  border-radius:clamp(16px,2vw,24px);
}
.song-meta .song-name{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(1rem,1.6vw,1.4rem);color:#f5dce8;letter-spacing:.05em;margin-bottom:3px;
}
.song-meta .song-artist{font-size:clamp(0.68rem,0.9vw,0.8rem);color:rgba(245,220,232,0.55);letter-spacing:.1em;}
.now-playing-dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:#d4849a;margin-right:7px;
  animation:blink 1.4s ease-in-out infinite;vertical-align:middle;
}
@keyframes blink{0%,100%{opacity:.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}

/* ── music card ── */
.music-card{
  background:rgba(255,240,248,0.12);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  padding:clamp(16px,2.2vh,26px) clamp(18px,2.2vw,28px);
  border-radius:clamp(16px,2vw,28px);
  box-shadow:0 12px 40px rgba(0,0,0,0.2);
  text-align:center;
  border:1px solid rgba(255,200,220,0.22);
  max-height:clamp(140px,16vh,148px);overflow:hidden;
  transition:max-height .7s cubic-bezier(.4,0,.2,1),background .3s;
}
.music-card:hover{max-height:600px;background:rgba(255,240,248,0.2);}

.controls{display:flex;justify-content:center;gap:clamp(10px,1.4vw,18px);margin-bottom:clamp(6px,1vh,12px);}
.control-btn{
  background:rgba(212,132,154,0.2);border:1px solid rgba(212,132,154,0.45);
  width:clamp(38px,4vw,52px);height:clamp(38px,4vw,52px);border-radius:50%;
  color:#f5dce8;cursor:pointer;transition:.25s;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(0.75rem,1vw,1rem);
}
.control-btn.play-btn{background:linear-gradient(135deg,#d4849a,#b86070);border-color:transparent;box-shadow:0 6px 18px rgba(180,96,112,0.4);}
.control-btn:hover{transform:scale(1.1);background:rgba(212,132,154,0.38);}
.control-btn.play-btn:hover{transform:scale(1.1);background:linear-gradient(135deg,#e098b0,#c87888);}

.expand-content{opacity:0;transition:opacity .4s ease;pointer-events:none;}
.music-card:hover .expand-content{opacity:1;pointer-events:auto;}
.slider-box{margin:clamp(7px,1.1vh,14px) 0;}
input[type=range]{accent-color:#d4849a;cursor:pointer;height:3px;width:100%;}
label{color:rgba(245,220,232,0.55);font-size:0.7rem;display:block;margin-bottom:4px;letter-spacing:.08em;}
.time-row{display:flex;align-items:center;font-size:0.68rem;color:rgba(245,220,232,0.65);gap:6px;}
.time-row span{min-width:32px;}
.time-row input{flex:1;}
.vol-row{display:flex;align-items:center;gap:8px;}
.vol-row span{color:rgba(245,220,232,0.55);font-size:0.85rem;}

.romantic-text{
  font-style:italic;color:rgba(255,240,248,0.8);line-height:1.75;
  margin-top:clamp(10px,1.5vh,16px);font-size:clamp(0.7rem,0.88vw,0.85rem);
  padding-top:clamp(10px,1.3vh,14px);border-top:1px solid rgba(255,200,220,0.2);
}

/* floating particles */
.particle{position:fixed;top:0;left:0;pointer-events:none;z-index:50;will-change:transform,opacity;font-size:clamp(14px,1.8vw,22px);}

/* mobile */
@media(max-width:640px){
  .stage{flex-direction:column;justify-content:flex-start;align-items:center;gap:16px;padding:72px 14px 32px;}
  .image-container{width:min(260px,80vw);height:min(520px,78vh);}
  .right-side{width:100%;max-width:420px;}
  .carousel-btn{opacity:1;}
}
@media(min-width:641px) and (max-width:960px){
  .stage{gap:24px;padding:60px 20px 24px;}
  .image-container{width:clamp(180px,22vw,280px);height:clamp(360px,56vh,540px);}
  .right-side{width:clamp(220px,32vw,360px);}
}
</style>
</head>
<body>

<a class="nav-back" href="index.html" id="backBtn">‹</a>
<p class="subtitle" style="text-align:center; margin-left:100px;" id="mainText">My love's World 🐰</p>

<div class="stage">

  <!-- IMAGE CAROUSEL -->
  <div class="image-container" id="imgContainer">
    <div class="carousel-track" id="carouselInner">
      <div class="carousel-slide"><img src="Olivia/Olivia.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka1.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka2.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka3.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka4.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka5.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka6.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka7.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka8.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka9.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka10.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka11.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka12.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka13.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka14.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka15.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka16.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka17.jpg" alt=""></div>
      <div class="carousel-slide"><img src="Olivia/touka18.jpg" alt=""></div>
    </div>
    <button class="carousel-btn prev" id="prevBtn">‹</button>
    <button class="carousel-btn next" id="nextBtn">›</button>
    <div class="carousel-dots" id="carouselDots"></div>
    <div class="slide-counter" id="slideCounter">1 / 19</div>
    <button class="bouquet-btn" id="bouquetBtn">🌸 See Your Bouquet</button>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right-side" id="rightSide">

    <!-- song info -->
    <div class="song-meta">
      <div class="song-name"><span class="now-playing-dot"></span>I Was All Over Her</div>
      <div class="song-artist">Salvia Palth</div>
    </div>

    <!-- music player -->
    <div class="music-card" id="musicCard">
      <div class="controls">
        <button class="control-btn" onclick="restartMusic()" title="Restart">↺</button>
        <button class="control-btn play-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
        <button class="control-btn" onclick="stopMusic()" title="Stop">■</button>
      </div>

      <div class="expand-content">
        <div class="slider-box">
          <div class="time-row">
            <span id="currentTime">0:00</span>
            <input type="range" id="progressSlider" value="0" min="0" max="100">
            <span id="durationTime">0:00</span>
          </div>
        </div>
        <div class="slider-box vol-row">
          <span>🔈</span>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" style="flex:1">
          <span>🔊</span>
        </div>
        <div class="romantic-text">
          In your eyes, I see strength and kindness. Every beat of this song reminds me of the grace you carry.
          You bring light into everyone around you. keep being you my baby 🌸
        </div>
      </div>
    </div>

  </div>
</div>

<audio id="loveSong"><source src="assets/i_was_all_over_her.mp3" type="audio/mpeg"></audio>

<script>
const song=document.getElementById('loveSong');
const playPauseBtn=document.getElementById('playPauseBtn');
const progressSlider=document.getElementById('progressSlider');
const volumeSlider=document.getElementById('volumeSlider');
const imgContainer=document.getElementById('imgContainer');
const rightSide=document.getElementById('rightSide');
const currentTimeEl=document.getElementById('currentTime');
const durationTimeEl=document.getElementById('durationTime');
const bouquetBtn=document.getElementById('bouquetBtn');
const backBtn=document.getElementById('backBtn');
const particles=['🌸','🌹','💖','✨','🌷','🤍','🐰'];

// CAROUSEL
const track=document.getElementById('carouselInner');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const dotsWrap=document.getElementById('carouselDots');
const counter=document.getElementById('slideCounter');
const slides=Array.from(track.querySelectorAll('.carousel-slide'));
const N=slides.length;
let cur=0,autoTimer=null;

track.style.width=(N*100)+'%';
slides.forEach(s=>{s.style.width=(100/N)+'%';});

function updateCarousel(){
  track.style.transform=`translateX(-${cur*(100/N)}%)`;
  dotsWrap.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('active',i===cur);
  });
  counter.textContent=`${cur+1} / ${N}`;
}
function goTo(i){cur=(i+N)%N;updateCarousel();resetAuto();}
function makeDots(){
  slides.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.addEventListener('click',()=>goTo(i));
    dotsWrap.appendChild(d);
  });
}
function resetAuto(){clearInterval(autoTimer);autoTimer=setInterval(()=>goTo(cur+1),5500);}
prevBtn.addEventListener('click',()=>goTo(cur-1));
nextBtn.addEventListener('click',()=>goTo(cur+1));
let tx=0;
track.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
track.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)goTo(cur+(dx<0?1:-1));},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goTo(cur+1);if(e.key==='ArrowLeft')goTo(cur-1);});
makeDots();resetAuto();

// SESSION
function saveState(){
  sessionStorage.setItem('mp_time',song.currentTime||0);
  sessionStorage.setItem('mp_playing',(!song.paused).toString());
  sessionStorage.setItem('mp_volume',song.volume);
}
bouquetBtn.addEventListener('click',()=>{saveState();window.location.href='bouquet.html';});
backBtn.addEventListener('click',e=>{e.preventDefault();saveState();window.location.href='index.html';});
window.addEventListener('beforeunload',saveState);
window.addEventListener('pagehide',saveState);

// AUDIO
function fmt(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
function togglePlay(){if(song.paused){song.play().catch(()=>{});playPauseBtn.textContent='||';}else{song.pause();playPauseBtn.textContent='▶';}}
function restartMusic(){song.currentTime=0;song.play().catch(()=>{});playPauseBtn.textContent='||';}
function stopMusic(){song.pause();song.currentTime=0;playPauseBtn.textContent='▶';}
song.addEventListener('loadedmetadata',()=>{durationTimeEl.textContent=fmt(song.duration);});
song.addEventListener('timeupdate',()=>{if(!song.duration)return;progressSlider.value=(song.currentTime/song.duration)*100;currentTimeEl.textContent=fmt(song.currentTime);});
song.addEventListener('ended',()=>{playPauseBtn.textContent='▶';});
progressSlider.addEventListener('input',()=>{song.currentTime=(progressSlider.value/100)*song.duration;});
volumeSlider.addEventListener('input',e=>{song.volume=e.target.value;});

// PARTICLES
function createParticle(x,y){
  const p=document.createElement('div');p.className='particle';
  p.textContent=particles[Math.floor(Math.random()*particles.length)];
  document.body.appendChild(p);
  p.style.left=x+'px';p.style.top=y+'px';p.style.transform='translate(-50%,-50%)';
  const dx=(Math.random()-.5)*700,dy=(Math.random()-.5)*700;
  p.animate([
    {transform:'translate(-50%,-50%) scale(0)',opacity:1},
    {transform:`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(1.4) rotate(720deg)`,opacity:0}
  ],{duration:3000,easing:'cubic-bezier(0.1,0.9,0.2,1)'}).onfinish=()=>p.remove();
}

// LOAD
window.addEventListener('load',()=>{
  const savedTime=parseFloat(sessionStorage.getItem('mp_time')||'0');
  const savedVol=parseFloat(sessionStorage.getItem('mp_volume')||'1');
  const wasPlaying=sessionStorage.getItem('mp_playing')==='true';
  imgContainer.classList.add('show');
  rightSide.classList.add('show');
  song.volume=savedVol;volumeSlider.value=savedVol;
  song.addEventListener('canplay',function onR(){
    song.removeEventListener('canplay',onR);
    try{if(savedTime>0)song.currentTime=savedTime;if(wasPlaying){song.play().catch(()=>{});playPauseBtn.textContent='||';}}catch(e){}
  },{once:true});
  setTimeout(()=>{song.play().then(()=>{playPauseBtn.textContent='||';}).catch(()=>{});},400);
  setTimeout(()=>{
    const r=imgContainer.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    for(let i=0;i<70;i++)setTimeout(()=>createParticle(cx,cy),i*7);
  },700);
});
</script>
</body>
</html>
