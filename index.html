<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="Olivia/image.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Playfair Display',serif;}

/* blurred bg */
body::before{
  content:"";position:fixed;inset:0;
  background:url('assets/lilly.jpg') no-repeat center center/cover;
  filter:blur(8px) brightness(0.42) saturate(1.2);
  transform:scale(1.1);z-index:0;
}

/* dark vignette overlay */
body::after{
  content:"";position:fixed;inset:0;
  background:radial-gradient(ellipse at center, transparent 30%, rgba(10,4,14,0.65) 100%);
  z-index:0;
}

.stage{
  position:relative;z-index:1;
  width:100vw;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:clamp(10px,2vh,20px);
}

/* floating petals */
.petal{
  position:fixed;pointer-events:none;z-index:0;
  border-radius:50% 20% 50% 20%;
  animation:petalFall linear infinite;
  opacity:0;
}
@keyframes petalFall{
  0%  {transform:translateY(-20px) rotate(0deg);  opacity:0;}
  5%  {opacity:.45;}
  95% {opacity:.25;}
  100%{transform:translateY(105vh) rotate(520deg);opacity:0;}
}

/* top eyebrow */
.eyebrow{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(0.7rem,1vw,0.85rem);
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:rgba(245,220,232,0.55);
  margin-bottom:clamp(4px,0.8vh,10px);
}

/* main title */
.hero-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.2rem,6vw,5.5rem);
  font-weight:300;
  font-style:italic;
  color:#f5dce8;
  letter-spacing:0.04em;
  line-height:1.1;
  text-align:center;
  text-shadow:0 4px 40px rgba(212,132,154,0.4);
  animation:titleFade 1.8s ease both;
}
@keyframes titleFade{
  0%{opacity:0;transform:translateY(20px);}
  100%{opacity:1;transform:translateY(0);}
}

/* divider */
.divider{
  width:clamp(60px,8vw,120px);height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,132,154,0.6),transparent);
  margin:clamp(6px,1.2vh,14px) 0;
  animation:titleFade 2s ease both;
}

/* subtitle */
.hero-sub{
  font-style:italic;
  font-size:clamp(0.85rem,1.4vw,1.15rem);
  color:rgba(245,220,232,0.6);
  letter-spacing:0.15em;
  text-align:center;
  animation:titleFade 2.2s ease both;
}

/* CTA button */
.reveal-btn{
  margin-top:clamp(16px,3vh,32px);
  position:relative;overflow:hidden;
  padding:clamp(14px,2vh,20px) clamp(44px,5vw,72px);
  background:transparent;
  color:#f5dce8;
  border:1.5px solid rgba(212,132,154,0.7);
  border-radius:100px;
  cursor:pointer;
  font-family:'Playfair Display',serif;
  font-size:clamp(0.9rem,1.3vw,1.1rem);
  letter-spacing:0.25em;
  text-transform:uppercase;
  transition:border-color .3s, color .3s, box-shadow .3s;
  backdrop-filter:blur(12px);
  box-shadow:0 0 0 0 rgba(212,132,154,0);
  animation:titleFade 2.5s ease both;
}
.reveal-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,132,154,0.2),rgba(184,96,112,0.2));
  opacity:0;transition:opacity .3s;
}
.reveal-btn:hover{
  border-color:rgba(212,132,154,1);
  box-shadow:0 0 36px rgba(212,132,154,0.35);
}
.reveal-btn:hover::before{opacity:1;}
.reveal-btn:active{transform:scale(0.97);}

/* small bunnies */
.bunny-row{
  display:flex;gap:clamp(8px,1.5vw,18px);margin-top:clamp(6px,1.2vh,14px);
  animation:titleFade 2.8s ease both;
}
.bunny-dot{
  width:clamp(7px,0.9vw,10px);height:clamp(7px,0.9vw,10px);
  border-radius:50%;background:rgba(212,132,154,0.45);
}
.bunny-dot:nth-child(2){background:rgba(212,132,154,0.65);}

/* corner deco */
.corner{
  position:fixed;pointer-events:none;z-index:1;
  width:clamp(80px,12vw,160px);height:clamp(80px,12vw,160px);
  opacity:0.18;
}
.corner svg{width:100%;height:100%;}
.corner.tl{top:0;left:0;}
.corner.tr{top:0;right:0;transform:scaleX(-1);}
.corner.bl{bottom:0;left:0;transform:scaleY(-1);}
.corner.br{bottom:0;right:0;transform:scale(-1,-1);}

/* mobile */
@media(max-width:480px){
  .hero-title{letter-spacing:.02em;}
  .reveal-btn{letter-spacing:.15em;padding:13px 36px;}
}
</style>
</head>
<body>

<!-- corner florals -->
<div class="corner tl"><svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 150 Q40 80 80 60 Q60 100 90 130" stroke="#d4849a" stroke-width="1.5" fill="none"/>
  <circle cx="82" cy="58" r="8" fill="#d4849a" opacity=".7"/>
  <circle cx="92" cy="50" r="5" fill="#e8a0b8" opacity=".6"/>
  <path d="M5 130 Q30 90 55 70" stroke="#d4849a" stroke-width="1" fill="none" opacity=".5"/>
  <circle cx="56" cy="69" r="5" fill="#d4849a" opacity=".5"/>
  <path d="M0 100 Q20 70 40 55" stroke="#d4849a" stroke-width="0.8" fill="none" opacity=".35"/>
</svg></div>
<div class="corner tr"><svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 150 Q40 80 80 60 Q60 100 90 130" stroke="#d4849a" stroke-width="1.5" fill="none"/>
  <circle cx="82" cy="58" r="8" fill="#d4849a" opacity=".7"/>
  <circle cx="92" cy="50" r="5" fill="#e8a0b8" opacity=".6"/>
  <path d="M5 130 Q30 90 55 70" stroke="#d4849a" stroke-width="1" fill="none" opacity=".5"/>
  <circle cx="56" cy="69" r="5" fill="#d4849a" opacity=".5"/>
</svg></div>
<div class="corner bl"><svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 150 Q40 80 80 60 Q60 100 90 130" stroke="#d4849a" stroke-width="1.5" fill="none"/>
  <circle cx="82" cy="58" r="8" fill="#d4849a" opacity=".7"/>
  <circle cx="92" cy="50" r="5" fill="#e8a0b8" opacity=".6"/>
</svg></div>
<div class="corner br"><svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 150 Q40 80 80 60 Q60 100 90 130" stroke="#d4849a" stroke-width="1.5" fill="none"/>
  <circle cx="82" cy="58" r="8" fill="#d4849a" opacity=".7"/>
</svg></div>

<div class="stage">
  <div class="eyebrow">a gift, just for you</div>
  <h1 class="hero-title">For My Princess</h1>
  <div class="divider"></div>
  <p class="hero-sub">press to open your moment 🌸</p>
  <button class="reveal-btn" onclick="window.location.href='reveal.html'">Reveal The Princess</button>
  <div class="bunny-row">
    <div class="bunny-dot"></div>
    <div class="bunny-dot"></div>
    <div class="bunny-dot"></div>
  </div>
</div>

<script>
// petals
(function(){
  const colors=['#e8a0b8','#d4849a','#f5c0d0','#ffaac8','#f0d0e0'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div');
    p.className='petal';
    const sz=Math.random()*10+4;
    p.style.cssText=`
      width:${sz}px;height:${sz*1.6}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;top:-20px;
      animation-duration:${Math.random()*10+10}s;
      animation-delay:${Math.random()*12}s;
    `;
    document.body.appendChild(p);
  }
})();
</script>
</body>
</html>
